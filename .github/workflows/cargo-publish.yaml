# Publish to crates.io
name: Publish
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Verify version
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          CARGO=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch: tag=$TAG, Cargo.toml=$CARGO"
            exit 1
          fi
      - name: Build and test
        run: |
          cargo build --release --all-targets
          cargo test --release
      - name: Publish workspace crates
        run: |
          for CRATE in $(ls -d crates/*/ | sed 's|crates/||;s|/||'); do
            echo "::group::Publishing $CRATE"
            while :; do
              OUTPUT=$(cargo publish -p "$CRATE" 2>&1) && echo "$OUTPUT" && break
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "$CRATE already published"
                break
              fi
              if echo "$OUTPUT" | grep -q "429"; then
                echo "Rate limited, sleeping 5 min..."
                sleep 300
                continue
              fi
              echo "$OUTPUT"
              echo "::error::$CRATE publish failed"
              exit 1
            done
            echo "::endgroup::"
            sleep 30
          done
      - name: Publish root crate
        run: |
          while :; do
            OUTPUT=$(cargo publish 2>&1) && echo "$OUTPUT" && break
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "grpctestify already published"; break
            fi
            echo "$OUTPUT"
            echo "Rate limited, sleeping 5 min..."
            sleep 300
          done
