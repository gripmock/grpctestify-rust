# Publish to crates.io
name: Publish
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Verify version
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          CARGO=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch: tag=$TAG, Cargo.toml=$CARGO"
            exit 1
          fi
      - name: Build and test
        run: |
          cargo build --release --all-targets
          cargo test --release
      - name: Publish workspace crates
        run: |
          CRATES=$(ls -d crates/*/ | sed 's|crates/||;s|/||')
          LEFT=$CRATES
          for PASS in 1 2 3 4 5; do
            [ -z "$LEFT" ] && break
            NEXT=""
            for CRATE in $LEFT; do
              VERSION=$(grep '^version' "crates/$CRATE/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$CRATE/$VERSION")
              if [ "$STATUS" = "200" ]; then
                echo "$CRATE v$VERSION already published, skipping"
                continue
              fi
              if cargo publish -p "$CRATE"; then
                echo "✓ $CRATE published"
              else
                NEXT="$NEXT $CRATE"
              fi
            done
            LEFT=$NEXT
            [ -n "$LEFT" ] && echo "Retrying ${LEFT} (pass $((PASS+1)))"
          done
          if [ -n "$LEFT" ]; then
            echo "::error::Failed to publish: $LEFT"
            exit 1
          fi
      - name: Publish root crate
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/grpctestify/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "::error::grpctestify v$VERSION already published"
            exit 1
          fi
          cargo publish
