# Publish to crates.io
name: Publish
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Verify version
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          CARGO=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch: tag=$TAG, Cargo.toml=$CARGO"
            exit 1
          fi
      - name: Build and test
        run: |
          cargo build --release --all-targets
          cargo test --release
      - name: Publish workspace crates
        run: |
          # Sorted by dependency depth: no-dependency crates first
          CRATES=(
            # Level 0: no apif-* dependencies
            apif-twoq-cache apif-source-error apif-cfg-runtime
            apif-query apif-ast apif-diagnostics apif-utils
            apif-state apif-grpc-transport
            # Level 1: depend only on Level 0
            apif-assert apif-parser apif-report
            # Level 2
            apif-plugins apif-semantics
            # Level 3
            apif-source-row apif-optimizer
            # Level 4
            apif-execution
          )
          declare -A DONE
          MAX_PASSES=10
          for PASS in $(seq 1 $MAX_PASSES); do
            echo "::group::Pass $PASS/$MAX_PASSES"
            ALL_DONE=true
            for CRATE in "${CRATES[@]}"; do
              if [ "${DONE[$CRATE]}" = "1" ]; then
                continue
              fi
              ALL_DONE=false
              OUTPUT=$(cargo publish -p "$CRATE" 2>&1) && echo "$OUTPUT" && DONE[$CRATE]=1 && continue
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "$CRATE already published"
                DONE[$CRATE]=1
                continue
              fi
              if echo "$OUTPUT" | grep -q "429"; then
                echo "Rate limited, will retry in next pass"
                continue
              fi
              if echo "$OUTPUT" | grep -q "failed to select a version"; then
                echo "$CRATE dependencies not yet published, will retry in next pass"
                continue
              fi
              echo "$OUTPUT"
              echo "::error::$CRATE publish failed"
              exit 1
            done
            echo "::endgroup::"
            if $ALL_DONE; then
              echo "All crates published successfully"
              break
            fi
            if [ "$PASS" -lt "$MAX_PASSES" ]; then
              sleep 30
            fi
          done
      - name: Publish root crate
        run: |
          while :; do
            OUTPUT=$(cargo publish 2>&1) && echo "$OUTPUT" && break
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "grpctestify already published"; break
            fi
            echo "$OUTPUT"
            echo "Rate limited, sleeping 5 min..."
            sleep 300
          done
